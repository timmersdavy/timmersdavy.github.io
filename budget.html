<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget — Davy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff4444;
    --red-dim: #ff444422;
    --yellow: #ffd600;
    --blue: #448aff;
    --text: #f0f0f0;
    --text-dim: #666666;
    --text-mid: #999999;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
  }

  .logo span { color: var(--green); }

  .saldo-badge {
    font-size: 0.75rem;
    color: var(--text-mid);
    text-align: right;
  }

  .saldo-badge strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: var(--green);
    font-weight: 700;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2rem;
    background: var(--surface);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--green);
    background: var(--green-dim);
  }

  .upload-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .upload-zone p { color: var(--text-mid); font-size: 0.85rem; }
  .upload-zone strong { color: var(--text); font-size: 1rem; display: block; margin-bottom: 0.25rem; }
  #fileInput { display: none; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: #333; }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.blue { color: var(--blue); }

  /* Charts */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1.8fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
  }

  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1.25rem;
  }

  /* Savings goals */
  .goals-section { margin-bottom: 2rem; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
  }

  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .goal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
    transform-origin: left;
    transition: transform 0.5s ease;
  }

  .goal-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .goal-name { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 0.25rem; }
  .goal-amounts { font-size: 0.75rem; color: var(--text-mid); margin-bottom: 0.75rem; }
  .goal-amounts strong { color: var(--text); }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .goal-pct {
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .goal-input-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  .goal-input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
  }

  .goal-input-row button {
    background: var(--green);
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .goal-input-row button:hover { opacity: 0.85; }

  /* Filters */
  .filters-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--green); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--green);
    color: var(--green);
  }

  /* Transactions */
  .transactions-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .tx-header {
    display: grid;
    grid-template-columns: 100px 1fr 120px 90px;
    gap: 1rem;
    padding: 0.75rem 1.25rem;
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }

  .tx-row {
    display: grid;
    grid-template-columns: 100px 1fr 120px 90px;
    gap: 1rem;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid #161616;
    font-size: 0.82rem;
    transition: background 0.15s;
    align-items: center;
  }

  .tx-row:hover { background: #161616; }
  .tx-row:last-child { border-bottom: none; }

  .tx-date { color: var(--text-dim); font-size: 0.75rem; }
  .tx-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    display: inline-block;
    text-align: center;
  }

  .tx-amount { text-align: right; font-weight: 500; }
  .tx-amount.positive { color: var(--green); }
  .tx-amount.negative { color: var(--red); }

  .cat-inkomen { background: #00e67615; color: var(--green); }
  .cat-boodschappen { background: #ffd60015; color: var(--yellow); }
  .cat-medisch { background: #ff448815; color: #ff4488; }
  .cat-abonnement { background: #448aff15; color: var(--blue); }
  .cat-transport { background: #ff6d0015; color: #ff6d00; }
  .cat-restaurant { background: #e040fb15; color: #e040fb; }
  .cat-overig { background: #33333380; color: var(--text-mid); }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .page-btns { display: flex; gap: 0.5rem; }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .page-btn:hover, .page-btn.active { border-color: var(--green); color: var(--green); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }

  /* Responsive */
  @media (max-width: 700px) {
    .charts-row { grid-template-columns: 1fr; }
    .tx-header, .tx-row { grid-template-columns: 80px 1fr 80px; }
    .tx-header > *:nth-child(3), .tx-row > *:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">budget<span>.</span></div>
    <div class="saldo-badge" id="saldoBadge" style="display:none">
      <span>Huidig saldo</span>
      <strong id="saldoVal">—</strong>
    </div>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📂</div>
    <strong>Sleep je Belfius CSV hier naartoe</strong>
    <p>of klik om te bladeren</p>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Inkomsten</div>
      <div class="stat-value green" id="statIn">€0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Uitgaven</div>
      <div class="stat-value red" id="statOut">€0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Netto</div>
      <div class="stat-value yellow" id="statNet">€0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Transacties</div>
      <div class="stat-value blue" id="statCount">0</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row" id="chartsRow" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Categorieën</div>
      <canvas id="pieChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Per maand</div>
      <canvas id="barChart" height="220"></canvas>
    </div>
  </div>

  <!-- Savings Goals -->
  <div class="goals-section">
    <div class="section-title">Spaardoelen</div>
    <div class="goals-grid" id="goalsGrid"></div>
  </div>

  <!-- Transactions -->
  <div id="txSection" style="display:none">
    <div class="section-title">Transacties</div>
    <div class="filters-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Zoeken op naam of mededeling...">
      <button class="filter-btn active" data-filter="all">Alles</button>
      <button class="filter-btn" data-filter="positive">Inkomsten</button>
      <button class="filter-btn" data-filter="negative">Uitgaven</button>
    </div>
    <div class="transactions-card">
      <div class="tx-header">
        <span>Datum</span>
        <span>Naam</span>
        <span>Categorie</span>
        <span style="text-align:right">Bedrag</span>
      </div>
      <div id="txList"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="big">🏦</div>
    Importeer je Belfius CSV om te beginnen
  </div>

</div>

<script>
// State
let allTx = [], filtered = [], page = 1, perPage = 20;
let activeFilter = 'all', searchQuery = '';
let pieChartInst = null, barChartInst = null;

// Goals data
const goalsData = [
  { id: 'cruise', icon: '🚢', name: 'MSC Cruise', target: 3000, saved: 1900, date: '25 jul 2026' },
  { id: 'telescope', icon: '🔭', name: 'AZ-GTi Mount', target: 359, saved: 0, date: 'Verjaardag' },
  { id: 'custom', icon: '🎯', name: 'Eigen doel', target: 1000, saved: 0, date: '' },
];

// Load saved goal data
function loadGoals() {
  try {
    const saved = JSON.parse(localStorage.getItem('budgetGoals') || '[]');
    saved.forEach(s => {
      const g = goalsData.find(g => g.id === s.id);
      if (g) g.saved = s.saved;
    });
  } catch(e) {}
}

function saveGoals() {
  localStorage.setItem('budgetGoals', JSON.stringify(goalsData.map(g => ({ id: g.id, saved: g.saved }))));
}

function renderGoals() {
  const grid = document.getElementById('goalsGrid');
  grid.innerHTML = goalsData.map(g => {
    const pct = Math.min(100, Math.round((g.saved / g.target) * 100));
    return `
      <div class="goal-card" id="goal-${g.id}">
        <div class="goal-icon">${g.icon}</div>
        <div class="goal-name">${g.name}${g.date ? ` <span style="font-size:0.7rem;color:var(--text-dim);font-weight:400">${g.date}</span>` : ''}</div>
        <div class="goal-amounts">Gespaard: <strong>€${g.saved.toFixed(0)}</strong> van €${g.target.toFixed(0)}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="goal-pct">${pct}% bereikt</div>
        <div class="goal-input-row">
          <input type="number" placeholder="€ toevoegen" id="ginput-${g.id}" min="0" step="10">
          <button onclick="addToGoal('${g.id}')">+</button>
        </div>
      </div>`;
  }).join('');
}

function addToGoal(id) {
  const g = goalsData.find(g => g.id === id);
  const val = parseFloat(document.getElementById('ginput-' + id).value);
  if (!g || isNaN(val) || val <= 0) return;
  g.saved = Math.min(g.target, g.saved + val);
  saveGoals();
  renderGoals();
}

// CSV Parser
function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  // Find header row (contains "Rekening;Boekingsdatum")
  let headerIdx = lines.findIndex(l => l.startsWith('Rekening;Boekingsdatum'));
  if (headerIdx === -1) headerIdx = 12;

  // Extract saldo
  const saldoLine = lines.find(l => l.startsWith('Laatste saldo;'));
  let saldo = null;
  if (saldoLine) {
    const m = saldoLine.match(/([\d.,]+)\s*EUR/);
    if (m) saldo = parseFloat(m[1].replace(',', '.'));
  }

  const txs = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = lines[i].split(';');
    if (cols.length < 11) continue;
    const dateStr = cols[1];
    const name = (cols[5] || cols[4] || '').trim();
    const memo = (cols[14] || cols[8] || '').trim();
    const amtStr = cols[10];
    if (!dateStr || !amtStr) continue;

    // Parse date DD/MM/YYYY
    const [d, m, y] = dateStr.split('/');
    const date = y ? new Date(y, m - 1, d) : null;
    if (!date || isNaN(date)) continue;

    const amount = parseFloat(amtStr.replace(',', '.'));
    if (isNaN(amount)) continue;

    txs.push({ date, dateStr, name: name || 'Onbekend', memo, amount, cat: categorize(name, memo, amount) });
  }

  txs.sort((a, b) => b.date - a.date);
  return { txs, saldo };
}

function categorize(name, memo, amount) {
  if (amount > 0) return 'inkomen';
  const n = (name + ' ' + memo).toLowerCase();
  if (/apple|spotify|netflix|disney|vtm go|streamz|adobe|github|chatgpt|claude|openai|duolingo/.test(n)) return 'abonnement';
  if (/colruyt|delhaize|aldi|lidl|carrefour|albert|boni|okay|match|spar/.test(n)) return 'boodschappen';
  if (/ziekenhuis|apotheek|dokter|kine|mutualiteit|cm |zorgkas|jessa|uz /.test(n)) return 'medisch';
  if (/brandstof|immoto|parking|nmbs|de lijn|taxi|uber/.test(n)) return 'transport';
  if (/restaurant|pizza|burger|mcdo|kfc|subway|frituur|lumar|sami ilyas/.test(n)) return 'restaurant';
  return 'overig';
}

const CAT_LABELS = {
  inkomen: 'Inkomen', boodschappen: 'Boodschappen', medisch: 'Medisch',
  abonnement: 'Abo', transport: 'Transport', restaurant: 'Restaurant', overig: 'Overig'
};

function fmt(n) {
  return (n >= 0 ? '+ ' : '- ') + '€' + Math.abs(n).toFixed(2).replace('.', ',');
}

function fmtShort(n) {
  return '€' + Math.abs(n).toFixed(0);
}

// Render
function renderStats() {
  const income = allTx.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const expense = allTx.filter(t => t.amount < 0).reduce((s, t) => s + t.amount, 0);
  document.getElementById('statIn').textContent = '€' + income.toFixed(0);
  document.getElementById('statOut').textContent = '€' + Math.abs(expense).toFixed(0);
  const net = income + expense;
  const el = document.getElementById('statNet');
  el.textContent = (net >= 0 ? '+' : '-') + '€' + Math.abs(net).toFixed(0);
  el.className = 'stat-value ' + (net >= 0 ? 'green' : 'red');
  document.getElementById('statCount').textContent = allTx.length;
}

function renderCharts() {
  // Pie chart - categories (expenses only)
  const cats = {};
  allTx.filter(t => t.amount < 0).forEach(t => {
    cats[t.cat] = (cats[t.cat] || 0) + Math.abs(t.amount);
  });

  const pieColors = ['#00e676','#ffd600','#ff4488','#448aff','#ff6d00','#e040fb','#666'];
  const catKeys = Object.keys(cats);

  if (pieChartInst) pieChartInst.destroy();
  pieChartInst = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: catKeys.map(k => CAT_LABELS[k] || k),
      datasets: [{ data: catKeys.map(k => cats[k].toFixed(2)), backgroundColor: pieColors, borderWidth: 0 }]
    },
    options: {
      plugins: { legend: { labels: { color: '#999', font: { family: 'DM Mono', size: 11 }, boxWidth: 10 } } },
      cutout: '60%'
    }
  });

  // Bar chart - monthly net
  const monthly = {};
  allTx.forEach(t => {
    const key = t.date.getFullYear() + '-' + String(t.date.getMonth() + 1).padStart(2, '0');
    if (!monthly[key]) monthly[key] = { in: 0, out: 0 };
    if (t.amount > 0) monthly[key].in += t.amount;
    else monthly[key].out += Math.abs(t.amount);
  });

  const mKeys = Object.keys(monthly).sort().slice(-8);
  const mLabels = mKeys.map(k => {
    const [y, m] = k.split('-');
    return ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][parseInt(m)-1] + ' ' + y.slice(2);
  });

  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [
        { label: 'Inkomsten', data: mKeys.map(k => monthly[k].in.toFixed(0)), backgroundColor: '#00e67640', borderColor: '#00e676', borderWidth: 1 },
        { label: 'Uitgaven', data: mKeys.map(k => monthly[k].out.toFixed(0)), backgroundColor: '#ff444440', borderColor: '#ff4444', borderWidth: 1 }
      ]
    },
    options: {
      plugins: { legend: { labels: { color: '#999', font: { family: 'DM Mono', size: 11 }, boxWidth: 10 } } },
      scales: {
        x: { ticks: { color: '#666', font: { family: 'DM Mono', size: 10 } }, grid: { color: '#1a1a1a' } },
        y: { ticks: { color: '#666', font: { family: 'DM Mono', size: 10 }, callback: v => '€' + v }, grid: { color: '#1a1a1a' } }
      }
    }
  });
}

function applyFilters() {
  filtered = allTx.filter(t => {
    if (activeFilter === 'positive' && t.amount <= 0) return false;
    if (activeFilter === 'negative' && t.amount >= 0) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!t.name.toLowerCase().includes(q) && !t.memo.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  page = 1;
  renderTx();
}

function renderTx() {
  const start = (page - 1) * perPage;
  const slice = filtered.slice(start, start + perPage);
  const list = document.getElementById('txList');

  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-dim);font-size:0.85rem">Geen transacties gevonden</div>';
  } else {
    list.innerHTML = slice.map(t => `
      <div class="tx-row">
        <span class="tx-date">${t.dateStr}</span>
        <span class="tx-name" title="${t.name}">${t.name}</span>
        <span><span class="tx-cat cat-${t.cat}">${CAT_LABELS[t.cat] || t.cat}</span></span>
        <span class="tx-amount ${t.amount > 0 ? 'positive' : 'negative'}">${fmt(t.amount)}</span>
      </div>`).join('');
  }

  // Pagination
  const total = Math.ceil(filtered.length / perPage);
  const pag = document.getElementById('pagination');
  pag.innerHTML = `
    <span>${filtered.length} transacties</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>←</button>
      <button class="page-btn active">${page} / ${total || 1}</button>
      <button class="page-btn" onclick="goPage(${page+1})" ${page>=total?'disabled':''}>→</button>
    </div>`;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / perPage);
  if (p < 1 || p > total) return;
  page = p;
  renderTx();
}

// Load CSV
function loadData({ txs, saldo }) {
  allTx = txs;
  filtered = [...txs];

  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('statsGrid').style.display = 'grid';
  document.getElementById('chartsRow').style.display = 'grid';
  document.getElementById('txSection').style.display = 'block';

  if (saldo !== null) {
    document.getElementById('saldoBadge').style.display = 'block';
    document.getElementById('saldoVal').textContent = '€' + saldo.toFixed(2).replace('.', ',');
  }

  renderStats();
  renderCharts();
  renderTx();
}

// Events
document.getElementById('uploadZone').addEventListener('click', () => document.getElementById('fileInput').click());

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadData(parseCSV(ev.target.result));
  reader.readAsText(file, 'windows-1252');
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadData(parseCSV(ev.target.result));
  reader.readAsText(file, 'windows-1252');
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

// Init
loadGoals();
renderGoals();
</script>
</body>
</html>
