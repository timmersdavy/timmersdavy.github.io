<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stuur een Aap 🙈 — Davy Timmers</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --yellow: #f5c842;
      --text: #f0ece0;
      --muted: #888;
      --border: #2a2a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }
    .emoji { font-size: 56px; margin-bottom: 12px; animation: sway 2.5s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--yellow);
      text-align: center;
    }
    .sub { color: var(--muted); font-size: 0.95rem; margin-top: 6px; text-align: center; }
    .divider { width: 40px; height: 2px; background: var(--yellow); margin: 28px auto; border-radius: 2px; }
    .links { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    .link-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 500;
      transition: border-color 0.2s, transform 0.15s;
    }
    .link-btn:hover { border-color: var(--yellow); transform: translateY(-2px); }
    .link-btn span { font-size: 1.2em; }
    .ban-card { width: 100%; max-width: 400px; margin-top: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; }
    .ban-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--yellow); margin-bottom: 4px; }
    .ban-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 18px; }
    .ban-addr { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 0.75rem; word-break: break-all; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
    .copy-btn { width: 100%; padding: 13px; background: var(--yellow); color: #000; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
    .copy-btn:active { opacity: 0.8; }
    .ban-note { font-size: 0.8rem; color: var(--muted); margin-top: 14px; line-height: 1.5; text-align: center; }
    footer { margin-top: 48px; color: var(--muted); font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="emoji">🙈</div>
  <h1>STUUR EEN AAP</h1>
  <p class="sub">Davy Timmers · Tessenderlo-Ham</p>
  <div class="divider"></div>
  <div class="links">
    <a href="https://www.tiktok.com/@timmersdavy" target="_blank" class="link-btn">
      <span>🎵 TikTok</span> <span>@timmersdavy →</span>
    </a>
    <a href="https://www.instagram.com/timmersdavy" target="_blank" class="link-btn">
      <span>📸 Instagram</span> <span>@timmersdavy →</span>
    </a>
    <div class="ban-card">
      <div class="ban-title">Stuur een Banano 🍌</div>
      <div class="ban-sub">Gratis crypto · Instant · Geen gedoe</div>
      <div class="ban-addr" id="addr">ban_1hkyhkkrxngp7oatwxyw73jsn6u6wsf8i8qetaoqa4bo8aqijx6ozdtnsms7</div>
      <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('addr').textContent);this.textContent='✓ Gekopieerd!';setTimeout(()=>this.textContent='Kopieer adres',2000);">Kopieer adres</button>
      <p class="ban-note">Nog geen Banano? Download <strong>Kalium</strong> — gratis en makkelijk.</p>
    </div>
  </div>
  <footer>© 2026 Davy Timmers</footer>
</body>
</html>
